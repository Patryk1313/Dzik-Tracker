<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dzik - Treningi</title>
    <link rel="icon" type="image/png" href="logo/black_logo.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="workouts">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand-cluster">
          <a class="brand brand-mark" href="index.html" aria-label="Dzik strona główna"><img src="logo/black_logo.png" alt="Dzik" /></a>
          <a class="brand brand-name" href="index.html">Dzik</a>
        </div>

        <nav class="nav-links">
          <a href="index.html" data-nav="home">Główna</a>
          <a href="dashboard.html" data-nav="dashboard">Panel</a>
          <a href="workouts.html" data-nav="workouts">Treningi</a>
          <a href="profile.html" data-nav="profile">Profil</a>
        </nav>

        <div class="user-actions">
          <span class="topbar-dot"></span>
          <img id="navUserPhoto" class="nav-user-photo hidden" alt="Awatar" />
          <span class="nav-user" id="navUser"></span>
          <button id="logoutBtn" class="btn btn-ghost" type="button">Wyloguj</button>
        </div>
      </div>
    </header>

    <main class="container app-board">
      <section class="card widget-neutral">
        <div class="section-header">
          <div>
            <p class="section-kicker">Twoje treningi</p>
            <h1 class="section-title">Historia z edycja</h1>
          </div>
          <a href="add-workout.html" class="btn btn-primary">+ Dodaj trening</a>
        </div>

        <div id="pageError" class="error-box hidden"></div>
        <div id="pageSuccess" class="success-box hidden"></div>


        <ul id="workoutsPageList" class="list workouts-list">
          <li>Brak treningów.</li>
        </ul>
      </section>

      <section id="workoutEditorCard" class="card widget-blue hidden" style="margin-top: 18px">
        <div class="section-header">
          <div>
            <p class="section-kicker">Edytor</p>
            <h2 class="section-title">Edytuj trening</h2>
          </div>
        </div>

        <form id="workoutEditForm" class="form">
          <div class="grid grid-2">
            <div class="form-row">
              <label for="editWorkoutTitle">Nazwa treningu</label>
              <input id="editWorkoutTitle" name="editWorkoutTitle" type="text" placeholder="Np. Push" required />
            </div>

            <div class="form-row">
              <label for="editWorkoutDate">Data treningu</label>
              <input id="editWorkoutDate" name="editWorkoutDate" type="date" required />
            </div>
          </div>

          <div class="form-row">
            <label>Ćwiczenia</label>
            <div id="editExercisesContainer" class="grid"></div>
          </div>

          <div class="grid grid-2">
            <button id="editAddExerciseBtn" class="btn btn-ghost" type="button">+ Dodaj ćwiczenie</button>
            <div class="grid grid-2">
              <button id="cancelEditBtn" class="btn btn-ghost" type="button">Anuluj</button>
              <button class="btn btn-primary" type="submit">Zapisz zmiany</button>
            </div>
          </div>
        </form>
      </section>
    </main>

    <nav class="mobile-bottom-nav" aria-label="Nawigacja mobilna">
      <a href="index.html" data-nav="home" class="mobile-bottom-link" aria-label="Strona główna">
        <img src="logo/black_logo.png" alt="" class="mobile-bottom-icon mobile-bottom-logo" />
      </a>
      <a href="dashboard.html" data-nav="dashboard" class="mobile-bottom-link" aria-label="Panel">
        <svg class="mobile-bottom-icon" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="4" y="12" width="3.5" height="8" rx="1.5"></rect>
          <rect x="10.25" y="8" width="3.5" height="12" rx="1.5"></rect>
          <rect x="16.5" y="4" width="3.5" height="16" rx="1.5"></rect>
        </svg>
      </a>
      <a href="workouts.html" data-nav="workouts" class="mobile-bottom-link" aria-label="Treningi">
        <svg class="mobile-bottom-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 10h3v4H3z"></path>
          <path d="M18 10h3v4h-3z"></path>
          <path d="M6 9h2v6H6z"></path>
          <path d="M16 9h2v6h-2z"></path>
          <path d="M8 11h8v2H8z"></path>
        </svg>
      </a>
      <a href="profile.html" data-nav="profile" class="mobile-bottom-link" aria-label="Profil">
        <svg class="mobile-bottom-icon" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="8" r="3.5"></circle>
          <path d="M5 19c1.8-3 4.1-4.5 7-4.5S17.2 16 19 19"></path>
        </svg>
      </a>
    </nav>

    <script type="module" src="app.js"></script>
  </body>
</html>
