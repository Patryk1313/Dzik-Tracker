<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dzik - Logowanie</title>
    <link rel="icon" type="image/png" href="../logo/black_logo.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="login">
    <main class="auth-shell auth-shell-minimal">
      <section class="auth-card auth-card-minimal">
        <div class="auth-minimal-brand" aria-label="Dzik">
          <img src="../logo/black_logo.png" alt="Dzik" />
          <strong>Dzik</strong>
        </div>

        <h2 class="auth-title">Logowanie i rejestracja</h2>
        <p class="auth-meta">Wpisz email i hasło, aby wejsc do panelu.</p>

        <div id="authError" class="error-box hidden"></div>
        <div id="authLoading" class="loading-box hidden">Przetwarzanie...</div>

        <form id="authForm" class="form auth-form" autocomplete="on">
          <div id="nameGroup" class="form-row hidden">
            <label for="name">Imię</label>
            <input id="name" name="name" type="text" placeholder="Twoje imię" />
          </div>

          <div class="form-row">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="twoj@email.com" required />
          </div>

          <div class="form-row">
            <label for="password">Hasło</label>
            <input id="password" name="password" type="password" minlength="6" required />
          </div>

          <button id="authSubmit" class="btn btn-primary auth-submit" type="submit">Zaloguj się</button>
        </form>

        <p class="auth-switch">
          <span id="authSwitchText">Nie masz konta?</span>
          <button id="authToggle" type="button">Zarejestruj się</button>
        </p>
      </section>
    </main>

    <script type="module" src="../app.js"></script>
  </body>
</html>
